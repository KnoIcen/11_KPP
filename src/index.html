<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Simple Screen Recorder</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.8.0/css/bulma.min.css"
    />
    <link rel="stylesheet" href="index.css" />
    <script defer src="render.js"></script>
  </head>
  <body>
    <h1 class="title is-4">Simple Screen Recorder</h1>
    <video></video>
    <div class="buttons is-centered">
      <button id="videoSelectBtn" class="button is-primary">
        Вибрати джерело відео
      </button>
      <button id="startBtn" class="button is-success">Старт</button>
      <button id="stopBtn" class="button is-warning">Стоп</button>
      <button id="openBtn" class="button is-info">Відкрити відео</button>
    </div>
  </body>
</html>
